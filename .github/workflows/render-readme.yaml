name: Render README

on:
  push:
    branches:
      - '**'
      - '!master'
    paths:
      - '**.Rmd'
  workflow_dispatch:

env:
  # Resolves the Node.js 20 deprecation warning by forcing Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Install system dependencies required by the 'sf' package on Linux
      - name: Install Spatial System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libudunits2-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install Dependencies
        run: |
          Rscript -e 'install.packages(c("rmarkdown", "knitr", "devtools", "remotes", "sf"))'
          Rscript -e 'remotes::install_deps(dependencies = TRUE)'
          Rscript -e 'devtools::install_local(".", dependencies = TRUE, upgrade = "never")'

      - name: Render README.Rmd
        run: |
          Rscript -e 'rmarkdown::render("README.Rmd", output_format = "github_document")'

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "Auto-render README.Rmd [skip ci]"
            git push
          else
            echo "No changes to README.md to commit."
          fi